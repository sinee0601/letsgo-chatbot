# mongo + redis 인프라 스택 (서버 138.2.122.172 에서 실행)
# 로컬 PC 챗봇이 공인 IP로 붙을 수 있도록 포트를 호스트에 게시한다.
# 실행: docker compose up -d
# 비밀번호는 같은 디렉터리의 .env 파일에서 주입한다 (MONGO_USER / MONGO_PW / REDIS_PW).

services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    environment:
      # 새(빈) 볼륨에 root 계정을 생성한다. 인증 소스는 admin.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PW}
    ports:
      # 외부(로컬 PC)에서 접속해야 하므로 호스트에 게시.
      # 보안을 위해 뒤의 방화벽/보안목록 설정을 반드시 함께 볼 것.
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    # requirepass 로 비밀번호 인증, appendonly 로 데이터 영속화.
    command: ["redis-server", "--requirepass", "${REDIS_PW}", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PW}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
